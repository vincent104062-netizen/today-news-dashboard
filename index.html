<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日新聞聚合 Final</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div>
        <h1>今日新聞聚合 Final</h1>
        <p class="subtitle">自動整理新聞，並可切換日期查看結果</p>
      </div>
      <span class="version-badge">Final</span>
    </div>

    <div class="info-box">
      <p><strong>最後更新時間：</strong><span id="updateTime">載入中...</span></p>
      <p><strong>目前查詢日期：</strong><span id="selectedDateLabel">載入中...</span></p>
      <p><strong>部署平台：</strong>GitHub + Vercel</p>
    </div>

    <div class="toolbar">
      <label for="datePicker"><strong>選擇日期：</strong></label>
      <input type="date" id="datePicker" />
      <button id="loadBtn">查詢新聞</button>
      <button id="todayBtn" type="button">今天</button>
      <button id="yesterdayBtn" type="button">昨天</button>
      <span id="statusText">準備載入新聞...</span>
    </div>

    <h2>新聞總覽</h2>
    <div id="newsList" class="news-list">
      <p class="loading">新聞載入中，請稍候...</p>
    </div>

    <div class="source-box">
      <h3>資料來源說明</h3>
      <p>
        本頁面會整理多家新聞來源資料，並依照所選日期篩選顯示。
        若當天資料較少或來源暫時沒有更新，畫面可能只顯示部分新聞。
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
